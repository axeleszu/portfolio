<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Unity WebGL Player</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background-color: transparent;
      overflow: hidden;
    }

    #unity-canvas {
      border: 0px none;
      background-color: transparent;
      width: 100% !important;
      height: 100% !important;
      max-width: none !important;
      max-height: none !important;
      margin: 0 !important;
      padding: 0 !important;
      display: block;
      outline: none;

    }

    .canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
  </style>
</head>

<body>
  <div class="canvas-container">
    <canvas id="unity-canvas" tabindex="-1" style="background: #231F20"></canvas>
  </div>
  <script src="Build/web.loader.js"></script>
  <script>
    createUnityInstance(document.querySelector("#unity-canvas"), {
      dataUrl: "Build/web.data.gz",
      frameworkUrl: "Build/web.framework.js.gz",
      codeUrl: "Build/web.wasm.gz",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "Axel Escutia",
      productName: "Final Project",
      productVersion: "0.1",
      // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
      // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
    });
  </script>
</body>

</html>
