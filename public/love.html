<!DOCTYPE html>
<html lang="en-us">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Skill Box</title>
	<style>
		html,
		body {
			margin: 0;
			padding: 0;
			width: 100vw;
			height: 100vh;
			background-color: transparent;
			overflow: hidden;
		}

		#canvas {
			border: 0px none;
			background-color: transparent;
			width: 100% !important;
			height: 100% !important;
			max-width: none !important;
			max-height: none !important;
			margin: 0 !important;
			padding: 0 !important;
			display: block;
			outline: none;

		}

		#canvas-container {
			width: 100%;
			height: 100%;
			position: relative;
		}
	</style>
</head>

<body>
	<div id="canvas-container">

		<canvas id="canvas" width="100%" height="100%"></canvas>
	</div>

	<footer>&copy; Axel Escutia &middot; Made using the <a href="https://love2d.org/" target="_blank">LÖVE Framework</a> (<a href="https://raw.githubusercontent.com/love2d/love/main/license.txt" target="_blank">License</a>) &middot; Packaged using <a href="https://schellingb.github.io/LoveWebBuilder/" target="_blank">LÖVE Web Builder</a></footer>
	<script>
		(function () {
			var TXT =
			{
				PLAYBTN: 'Click here \nto launch the game',
				LOAD: 'Downloading Game',
				PARSE: 'Preparing Game',
				EXECUTE: 'Starting Game',
				DLERROR: 'Error while downloading game data.\nCheck your internet connection.',
				NOWEBGL: 'Your browser or graphics card does not seem to support <a href="http://khronos.org/webgl/wiki/Getting_a_WebGL_Implementation">WebGL</a>.<br>Find out how to get it <a href="http://get.webgl.org/">here</a>.',
			};
			var canvas = document.getElementById('canvas'), ctx;
			var Msg = function (m) {
				ctx.clearRect(0, 0, canvas.width, canvas.height);
				ctx.fillStyle = '#888';

				var lines = m.split('\n');
				var n = lines.length;
				var lineHeight = 25;
				var startY = (canvas.height / 2) - (((n - 1) * lineHeight) / 2);

				for (var i = 0; i < n; i++) {
					ctx.fillText(lines[i], canvas.width / 2, startY + (i * lineHeight));
				}
			};
			var Fail = function (m) {
				canvas.outerHTML = '<div style="max-width:90%;width:' + canvas.clientWidth + 'px;height:' + canvas.clientHeight + 'px;background:#000;display:table-cell;vertical-align:middle"><div style="background-color:#FFF;color:#000;padding:1.5em;max-width:640px;width:80%;margin:auto;text-align:center">' + TXT.NOWEBGL + (m ? '<br><br>' + m : '') + '</div></div>';
			};
			var DoExecute = function () {
				Msg(TXT.EXECUTE);
				Module.canvas = canvas.cloneNode(false);
				Module.canvas.oncontextmenu = function (e) { e.preventDefault() };
				Module.setWindowTitle = function (title) { };
				Module.postRun = function () {
					if (!Module.noExitRuntime) { Fail(); return; }
					canvas.parentNode.replaceChild(Module.canvas, canvas);
					Txt = Msg = ctx = canvas = null;
					Module.canvas.focus();
				};
				setTimeout(function () { Module.run(['/p']); }, 50);
			};
			var DoLoad = function () {
				Msg(TXT.LOAD);
				var xhr = new XMLHttpRequest();
				xhr.open('GET', 'love.js');
				xhr.onprogress = function (e) {
					if (!e.lengthComputable || ctx.pCnt++ < 5) return;

					var barW = canvas.width * 0.7;
					var barH = 20;
					var x = (canvas.width / 2) - (barW / 2);
					var y = canvas.height * 0.6;
					var w = Math.min(e.loaded / e.total, 1) * barW;

					var g = ctx.createLinearGradient(x, 0, x + w, 0);
					g.addColorStop(0, '#72d3ff'); g.addColorStop(1, '#a2d4ea');

					ctx.fillStyle = '#1497ce'; ctx.fillRect(x - 2, y - 2, barW + 4, barH + 4);
					ctx.fillStyle = '#FFFFFF'; ctx.fillRect(x, y, barW, barH);
					ctx.fillStyle = g; ctx.fillRect(x, y, w, barH);
				};
				xhr.onerror = xhr.onabort = function () { Msg(TXT.DLERROR); canvas.disabled = false; };
				xhr.onload = function () {
					if (xhr.status != 200) { Msg(TXT.DLERROR + '<br>Status: ' + xhr.statusText); canvas.disabled = false; return; }
					Msg(TXT.PARSE);
					setTimeout(function () {
						window.onerror = function (e, u, l) { Fail(e + '<br>(' + u + ':' + l + ')'); };
						Module = { TOTAL_MEMORY: 1024 * 1024 * 24, TOTAL_STACK: 1024 * 1024 * 2, currentScriptUrl: '-', preInit: DoExecute };
						var s = document.createElement('script'), d = document.documentElement;
						s.textContent = xhr.response;
						d.appendChild(s);
						d.removeChild(s);
						xhr = xhr.response = s = s.textContent = null;
					}, 50);
				};
				xhr.send();
			}
			var DoSetup = function () {
				canvas.onclick = function () {
					if (canvas.disabled) return;
					canvas.disabled = true;
					canvas.scrollIntoView();
					ctx.pCnt = 0;
					DoLoad();
				};


				var boxW = canvas.width * 0.85;
				var boxH = Math.min(canvas.height * 0.2, 120);
				var boxX = (canvas.width / 2) - (boxW / 2);
				var boxY = (canvas.height / 2) - (boxH / 2);
				console.log('Drawing play button at ' + boxW + 'x' + boxH + ' (' + boxX + ',' + boxY + ')');

				ctx.fillStyle = '#888';
				ctx.fillRect(boxX - 2, boxY - 2, boxW + 4, boxH + 4);

				ctx.fillStyle = '#333';
				ctx.fillRect(boxX, boxY, boxW, boxH);

				ctx.fillStyle = '#888';

				var fontSize = Math.min(canvas.width / 15, 20);
				ctx.font = fontSize + 'px sans-serif';


				var lines = TXT.PLAYBTN.split('\n');
				for (var i = 0; i < lines.length; i++) {
					ctx.fillText(lines[i], canvas.width / 2, (canvas.height / 2) - 5 + (i * fontSize * 1.2));
				}
			};
			canvas.oncontextmenu = function (e) { e.preventDefault() };
			ctx = canvas.getContext('2d');
			var bounds = canvas.getBoundingClientRect();
			canvas.width = bounds.width;
			canvas.height = bounds.height;
			console.log('Canvas initialized at ' + canvas.width + 'x' + canvas.height);

			ctx.font = '20px sans-serif';
			ctx.textAlign = 'center';
			DoSetup();
		})()

	</script>

</body>

</html>
