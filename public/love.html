<!DOCTYPE html>
<html lang="en-us">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Skill Box</title>
	<style>
		html,
		body {
			margin: 0;
			padding: 0;
			width: 100vw;
			height: 100vh;
			background-color: transparent;
			overflow: hidden;
		}

		#canvas {
			border: 0px none;
			background-color: transparent;
			width: 100% !important;
			height: 100% !important;
			max-width: none !important;
			max-height: none !important;
			margin: 0 !important;
			padding: 0 !important;
			display: block;
			outline: none;

		}

		#canvas-container {
			width: 100%;
			height: 100%;
			position: relative;
		}
	</style>
</head>

<body>
	<div id="canvas-container">
		<canvas id="canvas" width="100%" height="100%"></canvas>
	</div>

	<footer>&copy; Axel Escutia | Made with <a href="https://love2d.org/" target="_blank">LÖVE</a> (<a href="https://raw.githubusercontent.com/love2d/love/main/license.txt" target="_blank">License</a>) &middot; Packaged using <a href="https://schellingb.github.io/LoveWebBuilder/" target="_blank">LÖVE Web Builder</a></footer>
	<script>
		(function () {
			const TXT = {
				PLAYBTN: 'CLICK TO PLAY',
				LOAD: 'Downloading...',
				PARSE: 'Preparing engine...',
				EXECUTE: 'Starting...',
				DLERROR: 'Network error.',
				NOWEBGL: 'Your browser does not support WebGL.'
			};

			const canvas = document.getElementById('canvas');
			const ctx = canvas.getContext('2d');

			// (HiDPI)
			const dpr = window.devicePixelRatio || 1;
			const rect = canvas.getBoundingClientRect();
			canvas.width = rect.width * dpr;
			canvas.height = rect.height * dpr;
			ctx.scale(dpr, dpr);

			const renderText = (text) => {
				ctx.clearRect(0, 0, rect.width, rect.height);
				ctx.fillStyle = '#888';
				ctx.font = '16px sans-serif';
				ctx.textAlign = 'center';
				ctx.textBaseline = 'middle';

				const lines = text.split('\n');
				lines.forEach((line, i) => {
					ctx.fillText(line, rect.width / 2, (rect.height / 2) + (i * 20));
				});
			};

			const loadEngine = async () => {
				renderText(TXT.LOAD);
				try {
					const response = await fetch('love.js');
					if (!response.ok) throw new Error();

					// BLOB
					const blob = await response.blob();
					const scriptUrl = URL.createObjectURL(blob);

					renderText(TXT.PARSE);

					window.Module = {
						TOTAL_MEMORY: 1024 * 1024 * 32, // 32MB
						print: function (text) { console.log('LUA: ' + text); },
						printErr: function (text) { console.error('ERR: ' + text); },
						setStatus: function (text) { console.log('Status: ' + text); },
						canvas: canvas.cloneNode(false),
						preInit: () => {
							renderText(TXT.EXECUTE);
							Module.canvas.oncontextmenu = e => e.preventDefault();
							Module.postRun = () => {
								canvas.parentNode.replaceChild(Module.canvas, canvas);
								Module.canvas.focus();
							};

						}
					};

					const s = document.createElement('script');
					s.src = scriptUrl;
					s.onload = () => {
						URL.revokeObjectURL(scriptUrl); // Memory cleanup
						Module.run(['/p']);
					};
					document.body.appendChild(s);

				} catch (e) {
					renderText(TXT.DLERROR);
				}
			};

			canvas.onclick = () => {
				if (canvas.dataset.loading) return;
				canvas.dataset.loading = "true";
				loadEngine();
			};

			// Dibujo inicial del botón
			renderText(TXT.PLAYBTN);
		})();


	</script>

</body>

</html>
